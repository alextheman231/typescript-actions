name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  package-ci:
    uses: alextheman231/github-actions/.github/workflows/package-ci.yml@5a51ff516a9036a0f71712e2028f28d7e6fe955b # v12.0.1
    with:
      run_build: false

  actions-ci:
    uses: alextheman231/github-actions/.github/workflows/actions-ci.yml@5a51ff516a9036a0f71712e2028f28d7e6fe955b # v12.0.1

  safe-npm-dependency-global-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Test run of safe-npm-dependency-global-install
        uses: ./actions/safe-npm-dependency-global-install
        with:
          package-name: alex-c-line
          dependency-group: devDependencies
