name: Create GitHub Release (Internal)
on:
  push:
    branches: ["main"]

jobs:
  create-github-release:
    permissions:
      contents: write
    uses: alextheman231/github-actions/.github/workflows/create-github-release.yml@b392a15552197a9ee42f5927ecf5b61852152c72 # v11.2.5
    secrets:
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
