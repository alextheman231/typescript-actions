name: Create GitHub Release (Internal)
on:
  push:
    branches: ["main"]

jobs:
  create-github-release:
    permissions:
      contents: write
    uses: alextheman231/github-actions/.github/workflows/create-github-release.yml@aa8a3ef9f3e8d4e820402e4f6bf811af5298c3a9 # v12.4.1
    secrets:
      APP_ID: ${{ vars.ALEX_UP_BOT_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.ALEX_UP_BOT_PRIVATE_KEY }}
